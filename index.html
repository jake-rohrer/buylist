<!DOCTYPE html>
<html lang="en">
<head>

<title>Mythic Games Colorado — Littleton Buylist</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    --bg: #ffffff; --bg2: #f5f4f1; --bg3: #eeecea;
    --text: #1a1a18; --text2: #5f5e5a; --text3: #999890;
    --border: rgba(0,0,0,0.12); --border2: rgba(0,0,0,0.22);
    --blue-bg: #e6f1fb; --blue: #185fa5;
    --green: #0f6e56; --green-bg: #e1f5ee;
    --purple: #534ab7; --purple-bg: #eeedfe;
    --red-c: #E24B4A; --amber: #BA7517;
    --radius: 8px; --radius-lg: 12px;
    --mono: 'Courier New', monospace;
    --sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    --col: 16px 12px 1fr 68px 72px auto auto;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1c1c1a; --bg2: #252523; --bg3: #2e2e2b;
      --text: #e8e6df; --text2: #a09e96; --text3: #666460;
      --border: rgba(255,255,255,0.1); --border2: rgba(255,255,255,0.2);
      --blue-bg: #0c2a45; --blue: #85b7eb;
      --green: #5dcaa5; --green-bg: #04342c;
      --purple: #afa9ec; --purple-bg: #26215c;
    }
  }
  body { font-family: var(--sans); background: var(--bg3); color: var(--text); min-height: 100vh; }
  .wrap { max-width: 980px; margin: 0 auto; padding: 2rem 1rem; }
  input, select, textarea, button { font-family: var(--sans); }
  input[type=text], select, textarea { color: var(--text); background: var(--bg); border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 6px 8px; font-size: 13px; outline: none; }
  input[type=text]:focus, select:focus, textarea:focus { border-color: var(--blue); }
  button { cursor: pointer; color: var(--text); background: transparent; border: 0.5px solid var(--border2); border-radius: var(--radius); padding: 4px 10px; font-size: 12px; }
  button:hover:not(:disabled) { background: var(--bg2); }
  button:disabled { opacity: 0.45; cursor: default; }
  h1 { font-size: 11px; font-weight: 500; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; margin-bottom: 1rem; }

  /* stats */
  .stat-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 8px; margin-bottom: 1rem; }
  .stat { background: var(--bg2); border-radius: var(--radius); padding: 10px 12px; }
  .stat-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px; }
  .stat-val { font-size: 20px; font-weight: 500; line-height: 1.2; }
  .stat-sub { font-size: 10px; color: var(--text3); margin-top: 2px; }
  .progress-bar { height: 3px; background: var(--bg2); border-radius: 2px; margin-bottom: 1.25rem; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--green); border-radius: 2px; transition: width 0.4s; }

  /* controls */
  .controls { display: flex; gap: 6px; margin-bottom: 6px; flex-wrap: wrap; align-items: center; }
  .controls2 { display: flex; gap: 6px; margin-bottom: 1rem; flex-wrap: wrap; align-items: center; }
  .controls input[type=text] { flex: 1 1 160px; }
  .fetch-btn { padding: 6px 14px; font-size: 12px; font-weight: 500; color: var(--purple); border-color: var(--purple); white-space: nowrap; }
  .fetch-btn:hover:not(:disabled) { background: var(--purple-bg); }
  .fetch-status { font-size: 11px; color: var(--text3); }
  .fetch-status.err { color: var(--red-c); }
  .fetch-status.ok { color: var(--green); }
  .export-btn { padding: 6px 12px; font-size: 12px; font-weight: 500; color: var(--green); border-color: var(--green); white-space: nowrap; margin-left: auto; }
  .export-btn:hover { background: var(--green-bg); }

  /* filter groups */
  .filter-group { display: flex; align-items: center; gap: 3px; background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--radius); padding: 3px 6px; }
  .filter-group-label { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; margin-right: 3px; white-space: nowrap; }
  .fg-btn { height: 24px; min-width: 24px; padding: 0 5px; font-size: 10px; font-weight: 600; border-radius: 5px; transition: background 0.1s, color 0.1s, border-color 0.1s; white-space: nowrap; }
  .fg-clear { width: 20px; height: 20px; padding: 0; font-size: 13px; line-height: 1; color: var(--text3); border: none; background: transparent; margin-left: 2px; }
  .fg-clear:hover { color: var(--text); background: transparent; }

  /* color dot */
  .color-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; border: 0.5px solid rgba(0,0,0,0.2); }

  /* table */
  .table-wrap { border: 0.5px solid var(--border); border-radius: var(--radius-lg); overflow: hidden; background: var(--bg); }
  .table-head { display: grid; grid-template-columns: var(--col); gap: 0 8px; padding: 5px 10px; background: var(--bg2); border-bottom: 0.5px solid var(--border); align-items: center; }
  .th { font-size: 10px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.06em; }
  .th.right { text-align: right; }
  .th.purple { color: var(--purple); }

  /* group header */
  .group-header { display: flex; align-items: center; gap: 8px; padding: 5px 10px; background: var(--bg2); border-bottom: 0.5px solid var(--border); border-top: 0.5px solid var(--border); cursor: pointer; user-select: none; }
  .group-header:first-child { border-top: none; }
  .group-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; border: 0.5px solid rgba(0,0,0,0.2); }
  .group-title { font-size: 11px; font-weight: 600; color: var(--text2); }
  .group-meta { font-size: 11px; color: var(--text3); margin-left: 4px; }
  .group-totals { font-size: 11px; color: var(--text3); margin-left: auto; font-family: var(--mono); display: flex; gap: 12px; }
  .group-totals .sf { color: var(--purple); }
  .group-chevron { font-size: 10px; color: var(--text3); margin-left: 6px; transition: transform 0.15s; }
  .group-chevron.open { transform: rotate(90deg); }

  /* rows */
  .row { border-bottom: 0.5px solid var(--border); }
  .row:last-child { border-bottom: none; }
  .row-main { display: grid; grid-template-columns: var(--col); gap: 0 8px; padding: 7px 10px; align-items: center; transition: opacity 0.15s; }
  .row-main.acquired { opacity: 0.38; }
  .card-name-cell { min-width: 0; }
  .card-name-line { display: flex; align-items: center; flex-wrap: wrap; gap: 4px; }
  .card-name-text { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .card-name-text.struck { text-decoration: line-through; text-decoration-color: var(--text3); }
  .qty-badge { flex-shrink: 0; display: inline-block; font-size: 10px; font-weight: 500; background: var(--blue-bg); color: var(--blue); padding: 1px 5px; border-radius: 4px; line-height: 15px; }
  .type-tag { flex-shrink: 0; font-size: 9px; font-weight: 500; padding: 1px 4px; border-radius: 3px; background: var(--bg2); color: var(--text3); border: 0.5px solid var(--border); white-space: nowrap; }

  /* mana pips */
  .mana-cost { display: inline-flex; align-items: center; gap: 2px; flex-shrink: 0; }
  .pip { display: inline-flex; align-items: center; justify-content: center; width: 14px; height: 14px; border-radius: 50%; font-size: 8px; font-weight: 700; line-height: 1; border: 0.5px solid rgba(0,0,0,0.25); flex-shrink: 0; }
  .pip-W { background: #f8f5e0; color: #5a4e00; }
  .pip-U { background: #1a6fb5; color: #fff; }
  .pip-B { background: #2a2228; color: #c9b8d8; }
  .pip-R { background: #cc3300; color: #fff; }
  .pip-G { background: #1a6b3a; color: #fff; }
  .pip-C { background: #c8c0bc; color: #3a3632; }
  .pip-X { background: #888480; color: #fff; }
  .pip-num { background: #888480; color: #fff; }
  .pip-split { background: linear-gradient(135deg,#1a6b3a 50%,#cc3300 50%); color: #fff; font-size: 7px; }
  .pip-other { background: #aaa; color: #fff; }

  .note-preview { font-size: 11px; font-style: italic; color: var(--text3); }
  .note-preview.match { color: var(--blue); background: var(--blue-bg); padding: 0 3px; border-radius: 3px; }

  /* price cells */
  .sf-cell { text-align: right; }
  .sf-val { font-size: 12px; font-family: var(--mono); color: var(--purple); white-space: nowrap; }
  .sf-val.na { color: var(--text3); font-size: 11px; }
  .sf-val.empty { color: var(--border2); }
  .sf-sub { font-size: 10px; color: var(--text3); font-family: var(--mono); }
  .price-cell { text-align: right; }
  .price-display { cursor: text; display: flex; flex-direction: column; align-items: flex-end; gap: 1px; min-height: 20px; }
  .price-val { font-size: 12px; font-family: var(--mono); white-space: nowrap; }
  .price-val.empty { color: var(--border2); }
  .price-sub { font-size: 10px; color: var(--text3); font-family: var(--mono); }
  .price-input { width: 100%; font-size: 12px; font-family: var(--mono) !important; padding: 2px 4px; text-align: right; border: 0.5px solid var(--border2); border-radius: var(--radius); background: var(--bg); color: var(--text); }

  .set-meta { display: flex; align-items: center; gap: 8px; white-space: nowrap; }
  .set-code { font-family: var(--mono); font-size: 11px; color: var(--text3); }
  .note-btn { font-size: 10px; padding: 2px 6px; }
  .note-btn.has-note { color: var(--blue); }
  .note-btn.open-state { background: var(--bg2); }
  .priority-btns { display: flex; gap: 3px; justify-content: flex-end; }
  .pbtn { width: 22px; height: 22px; padding: 0; font-size: 9px; font-weight: 500; line-height: 1; transition: background 0.1s, color 0.1s; }
  .remove-btn { width: 20px; height: 20px; padding: 0; font-size: 13px; line-height: 1; color: var(--text3); border: none; background: transparent; margin-left: 4px; flex-shrink: 0; transition: color 0.1s; }
  .remove-btn:hover { color: var(--red-c); background: transparent; }
  .remove-btn.armed { color: var(--red-c); font-weight: 700; font-size: 10px; width: auto; padding: 0 5px; border: 0.5px solid var(--red-c); border-radius: 4px; }
  .graveyard-section { margin-top: 1.25rem; border: 0.5px solid #4a3a3a; border-radius: var(--radius-lg); overflow: hidden; }
  .graveyard-header { display: flex; align-items: center; gap: 8px; padding: 9px 12px; background: #2a1f1f; border-bottom: 0.5px solid #4a3a3a; }
  .graveyard-title { font-size: 12px; font-weight: 600; color: #c9a090; letter-spacing: 0.04em; }
  .graveyard-sub { font-size: 11px; color: #7a6060; margin-left: 4px; }
  .graveyard-row { display: grid; grid-template-columns: 12px 1fr auto auto; gap: 0 10px; align-items: center; padding: 6px 12px; border-bottom: 0.5px solid #3a2a2a; background: #1e1616; }
  .graveyard-row:last-child { border-bottom: none; }
  .graveyard-name { font-size: 13px; color: #7a6060; text-decoration: line-through; text-decoration-color: #4a3a3a; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .graveyard-set { font-family: var(--mono); font-size: 11px; color: #5a4a4a; white-space: nowrap; }
  .graveyard-restore { font-size: 11px; padding: 2px 8px; color: #c9a090; border-color: #4a3a3a; background: transparent; white-space: nowrap; }
  .graveyard-restore:hover { background: #3a2525; color: #e8c0a8; border-color: #7a5050; }
  .graveyard-btn { font-size: 12px; padding: 5px 10px; color: #7a5a5a; border-color: #4a3a3a; white-space: nowrap; }
  .graveyard-btn:hover { background: #2a1f1f; color: #c9a090; border-color: #7a5050; }
  .graveyard-btn.active { color: #c9a090; border-color: #7a5050; }
  .notes-area { padding: 0 10px 8px 46px; }
  .notes-area textarea { width: 100%; resize: vertical; font-size: 12px; }

  /* footer */
  .footer-totals { border-top: 0.5px solid var(--border2); background: var(--bg2); padding: 8px 10px; display: flex; flex-direction: column; gap: 0; }
  .footer-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 8px; padding: 6px 0; }
  .footer-row + .footer-row { border-top: 0.5px solid var(--border); }
  .footer-row-hi { background: rgba(83,74,183,0.06); border-radius: 4px; padding: 6px 8px !important; margin-bottom: 2px; }
  .footer-left { display: flex; gap: 12px; flex-wrap: wrap; align-items: center; }
  .footer-section { font-size: 10px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text3); min-width: 60px; }
  .footer-section.purple { color: var(--purple); }
  .footer-kv { font-size: 12px; }
  .footer-kv .lbl { color: var(--text3); margin-right: 3px; }
  .footer-kv .val { font-weight: 500; font-family: var(--mono); }
  .footer-kv .val.green { color: var(--green); }
  .footer-kv .val.purple { color: var(--purple); }
  .footer-right { display: flex; align-items: baseline; gap: 6px; }
  .footer-total-lbl { font-size: 11px; color: var(--text3); }
  .footer-total-val { font-size: 16px; font-weight: 500; font-family: var(--mono); }
  .footer-total-val.purple { color: var(--purple); }

  .meta { margin-top: 8px; font-size: 11px; color: var(--text3); text-align: right; }
  .no-match { padding: 2rem; text-align: center; color: var(--text3); font-size: 13px; }

  /* add card panel */
  .add-panel-toggle { padding: 6px 12px; font-size: 12px; font-weight: 500; color: var(--blue); border-color: var(--blue); white-space: nowrap; }
  .add-panel-toggle:hover { background: var(--blue-bg); }
  .add-panel-toggle.open { background: var(--blue-bg); }
  .add-panel { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); margin-bottom: 1rem; overflow: hidden; }
  .add-panel-tabs { display: flex; background: var(--bg2); border-bottom: 0.5px solid var(--border); }
  .add-tab { flex: 1; padding: 9px 14px; font-size: 12px; font-weight: 500; border: none; border-radius: 0; background: transparent; color: var(--text3); border-bottom: 2px solid transparent; transition: color 0.1s; }
  .add-tab.active { color: var(--text); border-bottom-color: var(--blue); }
  .add-tab:hover:not(.active) { color: var(--text2); background: transparent; }
  .add-panel-body { padding: 14px; display: flex; flex-direction: column; gap: 12px; }

  .printing-row:last-child { border-bottom: none; }
  .printing-row:hover { background: var(--bg2); }
  .printing-row.sel { background: var(--blue-bg); }
  .pr-set { font-family: var(--mono); font-size: 11px; color: var(--text3); }
  .pr-name { font-size: 12px; color: var(--text2); }
  .pr-num { font-family: var(--mono); font-size: 11px; color: var(--text3); }
  .pr-date { font-size: 11px; color: var(--text3); }
  .pr-price { font-size: 12px; font-family: var(--mono); color: var(--purple); }
  .add-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .qty-input { width: 52px; text-align: center; }
  .add-confirm-btn { padding: 6px 18px; font-size: 13px; font-weight: 500; color: #fff; background: var(--blue); border-color: var(--blue); border-radius: var(--radius); }
  .add-confirm-btn:hover:not(:disabled) { background: #1450a0; }
  .add-confirm-btn:disabled { opacity: 0.4; }
  .add-status { font-size: 11px; }
  .add-status.ok { color: var(--green); }
  .add-status.err { color: var(--red-c); }
  .bulk-textarea { width: 100%; height: 130px; resize: vertical; font-family: var(--mono) !important; font-size: 12px; }
  .bulk-hint { font-size: 11px; color: var(--text3); font-family: var(--mono); }
  .custom-badge { flex-shrink: 0; font-size: 9px; font-weight: 600; padding: 1px 4px; border-radius: 3px; background: var(--blue-bg); color: var(--blue); border: 0.5px solid var(--blue); line-height: 14px; }

  /* header bar */
  .header-bar { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; gap: 10px; }
  .header-bar h1 { margin: 0; }
  .sync-pill { display: flex; align-items: center; gap: 5px; font-size: 11px; padding: 3px 9px; border-radius: 20px; border: 0.5px solid var(--border2); background: var(--bg2); white-space: nowrap; cursor: default; }
  .sync-pill.synced  { color: var(--green); border-color: var(--green); }
  .sync-pill.saving  { color: var(--amber); border-color: var(--amber); }
  .sync-pill.error   { color: var(--red-c); border-color: var(--red-c); cursor: pointer; }
  .sync-pill.offline { color: var(--text3); }
  .sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
  .sync-dot.pulse { animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* settings panel */
  .settings-btn { width: 28px; height: 28px; padding: 0; font-size: 15px; border: 0.5px solid var(--border2); border-radius: var(--radius); background: transparent; color: var(--text3); flex-shrink: 0; }
  .settings-btn:hover { color: var(--text); background: var(--bg2); }
  .settings-panel { background: var(--bg); border: 0.5px solid var(--border); border-radius: var(--radius-lg); padding: 16px; margin-bottom: 1rem; display: flex; flex-direction: column; gap: 12px; }
  .settings-title { font-size: 12px; font-weight: 600; color: var(--text2); }
  .settings-row { display: flex; flex-direction: column; gap: 4px; }
  .settings-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.05em; }
  .settings-input { font-family: var(--mono) !important; font-size: 12px; padding: 6px 8px; }
  .settings-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
  .settings-btn-primary { padding: 6px 14px; font-size: 12px; font-weight: 500; color: #fff; background: var(--blue); border-color: var(--blue); }
  .settings-btn-primary:hover:not(:disabled) { background: #1450a0; }
  .settings-btn-primary:disabled { opacity: 0.45; }
  .settings-hint { font-size: 11px; color: var(--text3); line-height: 1.5; }
  .settings-hint a { color: var(--blue); }
  .settings-status { font-size: 11px; }
  .settings-status.ok  { color: var(--green); }
  .settings-status.err { color: var(--red-c); }
</style>

function parseCards(raw) {
  return raw.trim().split("\n").map((line, i) => {
    const m = line.match(/^(\d+)\s+(.+?)\s+\((.+?)\)\s+(.+)$/);
    if (!m) return null;
    return { id: i, qty: parseInt(m[1]), name: m[2], set: m[3], num: m[4], acquired: false, priority: null, notes: "", price: "" };
  }).filter(Boolean);
}

function getCategory(colorsArr, typeLine) {
  if (!typeLine && (!colorsArr || colorsArr.length === 0)) return "colorless";
  const tl = (typeLine || "").toLowerCase();
  if (tl.includes("land")) return "land";
  if (tl.includes("equipment")) return "equipment";
  if (!colorsArr || colorsArr.length === 0) {
    return tl.includes("artifact") ? "artifact" : "colorless";
  }
  if (colorsArr.length > 1) return "multi";
  return colorsArr[0]; // W U B R G
}

function parseMana(str) {
  if (!str) return [];
  return (str.match(/\{[^}]+\}/g) || []).map(m => m.slice(1,-1));
}
function pipClass(sym) {
  if (sym==="W") return "pip pip-W"; if (sym==="U") return "pip pip-U";
  if (sym==="B") return "pip pip-B"; if (sym==="R") return "pip pip-R";
  if (sym==="G") return "pip pip-G"; if (sym==="C") return "pip pip-C";
  if (sym==="X") return "pip pip-X"; if (/^\d+$/.test(sym)) return "pip pip-num";
  if (sym.includes("/")) return "pip pip-split";
  return "pip pip-other";
}
function ManaCost({ cost }) {
  if (!cost) return null;
  const tokens = parseMana(cost);
  if (!tokens.length) return null;
  return React.createElement("span", { className:"mana-cost" },
    ...tokens.map((sym,i) => React.createElement("span",{key:i,className:pipClass(sym),title:`{${sym}}`},sym.includes("/")?sym:sym))
  );
}

// ── Scryfall fetch ───────────────────────────────────────────────────────────
async function fetchScryfall(cards) {
  const BATCH = 75;
  const nameToId = {};
  for (const c of cards) nameToId[c.name.split(" // ")[0].toLowerCase()] = c.id;

  const priceById  = {};
  const manaById   = {};
  const colorsById = {}; // { id: { colors:[], typeLine:"" } }

  for (let i = 0; i < cards.length; i += BATCH) {
    const batch = cards.slice(i, i + BATCH);
    const identifiers = batch.map(c => ({ name:c.name, set:c.set.toLowerCase(), collector_number:c.num }));
    const resp = await fetch("https://api.scryfall.com/cards/collection", {
      method: "POST", headers: { "Content-Type":"application/json" },
      body: JSON.stringify({ identifiers }),
    });
    if (!resp.ok) throw new Error(`Scryfall HTTP ${resp.status}`);
    const json = await resp.json();
    for (const card of (json.data || [])) {
      const key = card.name.split(" // ")[0].toLowerCase();
      const id  = nameToId[key];
      if (id !== undefined) {
        priceById[id]  = card.prices?.usd ?? null;
        manaById[id]   = card.mana_cost || card.card_faces?.[0]?.mana_cost || "";
        colorsById[id] = {
          colors:   card.colors   || card.card_faces?.[0]?.colors   || [],
          typeLine: card.type_line|| card.card_faces?.[0]?.type_line || "",
        };
      }
    }
    for (const nf of (json.not_found || [])) {
      const key = (nf.name||"").split(" // ")[0].toLowerCase();
      const id  = nameToId[key];
      if (id !== undefined) priceById[id] = "N/A";
    }
    if (i + BATCH < cards.length) await new Promise(r => setTimeout(r, 120));
  }
  return { priceById, manaById, colorsById };
}

// ── CSV export ───────────────────────────────────────────────────────────────
function csvEscape(v) {
  const s = String(v ?? "");
  return s.includes(",") || s.includes('"') || s.includes("\n") ? `"${s.replace(/"/g,'""')}"` : s;
}
function exportCSV(list, sfPrices, manaCosts, cardColors) {
  const headers = ["Qty","Card Name","Mana Cost","Colors","Type Line","Category","Set","Collector #","Priority","Scryfall Price","Scryfall Line Total","My Price","My Line Total","Acquired","Notes"];
  const rows = list.map(c => {
    const cl    = cardColors[c.id] || {};
    const cat   = getCategory(cl.colors, cl.typeLine);
    const sfRaw = sfPrices[c.id];
    const sfNum = sfRaw && sfRaw !== "N/A" ? parseFloat(sfRaw) : "";
    const myNum = c.price !== "" ? parseFloat(c.price) : "";
    return [
      c.qty, c.name, manaCosts[c.id]||"",
      (cl.colors||[]).join(""), cl.typeLine||"",
      cat ? (CAT[cat]?.label||cat) : "",
      c.set, c.num,
      c.priority ? `P${c.priority}` : "",
      sfNum!==""?sfNum.toFixed(2):"", sfNum!==""?(sfNum*c.qty).toFixed(2):"",
      myNum!==""?myNum.toFixed(2):"", myNum!==""?(myNum*c.qty).toFixed(2):"",
      c.acquired?"Yes":"No", c.notes,
    ].map(csvEscape).join(",");
  });
  const csv  = [headers.map(csvEscape).join(","), ...rows].join("\n");
  const blob = new Blob([csv], { type:"text/csv" });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement("a");
  a.href = url; a.download = `mythic-buylist-${new Date().toISOString().slice(0,10)}.csv`;
  a.click(); URL.revokeObjectURL(url);
}

const JB_BASE = "https://api.jsonbin.io/v3";
const SYNC_KEY = "mythic-buylist-sync-creds"; // { apiKey, binId }

function loadCreds() { return loadLS(SYNC_KEY) || { apiKey:"", binId:"" }; }
function saveCreds(c) { saveLS(SYNC_KEY, c); }

async function jbRead(apiKey, binId) {
  const r = await fetch(`${JB_BASE}/b/${binId}/latest`, {
    headers: { "X-Master-Key": apiKey },
  });
  if (!r.ok) throw new Error(`JSONBin read failed: ${r.status}`);
  const d = await r.json();
  return d.record;
}

async function jbWrite(apiKey, binId, data) {
  const r = await fetch(`${JB_BASE}/b/${binId}`, {
    method: "PUT",
    headers: { "Content-Type":"application/json", "X-Master-Key": apiKey },
    body: JSON.stringify(data),
  });
  if (!r.ok) throw new Error(`JSONBin write failed: ${r.status}`);
}

async function jbCreate(apiKey) {
  const r = await fetch(`${JB_BASE}/b`, {
    method: "POST",
    headers: { "Content-Type":"application/json", "X-Master-Key": apiKey, "X-Bin-Name":"mythic-buylist", "X-Private":"true" },
    body: JSON.stringify({ _init: true }),
  });
  if (!r.ok) throw new Error(`JSONBin create failed: ${r.status}`);
  const d = await r.json();
  return d.metadata.id;
}

function SettingsPanel({ onCredsChange }) {
  const [creds,  setCreds]  = useState(loadCreds);
  const [status, setStatus] = useState(null);
  const [busy,   setBusy]   = useState(false);

  const update = field => e => {
    const next = { ...creds, [field]: e.target.value.trim() };
    setCreds(next); saveCreds(next); onCredsChange(next);
  };

  const handleCreate = async () => {
    if (!creds.apiKey) { setStatus({ err:true, msg:"Paste your API key first." }); return; }
    setBusy(true); setStatus(null);
    try {
      const id = await jbCreate(creds.apiKey);
      const next = { ...creds, binId: id };
      setCreds(next); saveCreds(next); onCredsChange(next);
      setStatus({ ok:true, msg:`✓ Bin created! ID: ${id} — your data will now sync automatically.` });
    } catch(e) { setStatus({ err:true, msg:e.message }); }
    setBusy(false);
  };

  const handleTest = async () => {
    if (!creds.apiKey || !creds.binId) { setStatus({ err:true, msg:"Fill in both fields first." }); return; }
    setBusy(true); setStatus(null);
    try {
      await jbRead(creds.apiKey, creds.binId);
      setStatus({ ok:true, msg:"✓ Connection successful — sync is active." });
    } catch(e) { setStatus({ err:true, msg:e.message }); }
    setBusy(false);
  };

  return React.createElement("div", { className:"settings-panel" },

    React.createElement("div", { className:"settings-hint" },

      " → go to API Keys → copy your Master Key.",
      React.createElement("br"),
      "2. Paste it below, then click \"Create bin\" — your data syncs automatically from that point on.",
      React.createElement("br"),
      "3. On any other device, paste the same key + Bin ID, then click \"Test connection\".",
    ),
    React.createElement("div", { className:"settings-row" },
      React.createElement("label", { className:"settings-label" }, "Master API Key"),
      React.createElement("input", { type:"password", className:"settings-input", value:creds.apiKey, onChange:update("apiKey"), placeholder:"$2b$10$..." }),
    ),
    React.createElement("div", { className:"settings-row" },
      React.createElement("label", { className:"settings-label" }, "Bin ID (auto-filled after create)"),
      React.createElement("input", { type:"text", className:"settings-input", value:creds.binId, onChange:update("binId"), placeholder:"64f3a..." }),

}

// ── App ──────────────────────────────────────────────────────────────────────
function App() {
  const [cards,        setCards]        = useState(() => { const s=loadLS(SKEY); return s?applyData(s):INITIAL; });
  const [customCards,  setCustomCards]  = useState(() => loadLS(CUSTOM_KEY)||[]);
  const [sfPrices,     setSfPrices]     = useState(() => loadLS(SFKEY)||{});
  const [manaCosts,    setManaCosts]    = useState(() => loadLS(MCKEY)||{});
  const [cardColors,   setCardColors]   = useState(() => loadLS(CLKEY)||{});
  const [removed,      setRemoved]      = useState(() => new Set(loadLS(RMKEY)||[]));
  const [showRemoved,  setShowRemoved]  = useState(false);
  const [showAddPanel, setShowAddPanel] = useState(false);
  const [showSettings, setShowSettings] = useState(false);
  const [creds,        setCreds]        = useState(loadCreds);

  const syncDebounce   = useRef(null);
  const [sfStatus,     setSfStatus]     = useState(null);

      const next=prev.map(c=>c.id===id?{...c,...patch}:c); persist(next); return next;
    });
    setCustomCards(prev => {
      if (!prev.some(c=>c.id===id)) return prev;
      const next=prev.map(c=>c.id===id?{...c,...patch}:c); saveLS(CUSTOM_KEY,next); return next;
    });
  }, [persist]);

  const addCards = useCallback(newCards => {
    setCustomCards(prev => { const next=[...prev,...newCards]; saveLS(CUSTOM_KEY,next); return next; });

    if (meta.mana   !==undefined) setManaCosts(prev   => { const n={...prev,[id]:meta.mana};   saveLS(MCKEY,n); return n; });

  }, []);

    userCards:   (() => { const d={}; cards.forEach(c=>{ d[c.id]={acquired:c.acquired,priority:c.priority,notes:c.notes,price:c.price}; }); return d; })(),
    customCards, removed:[...removed],
    sfPrices, manaCosts, cardColors,
  }), [cards, customCards, removed, sfPrices, manaCosts, cardColors]);

  const pushToCloud = useCallback(async (payload, cr) => {
    if (!cr.apiKey||!cr.binId) return;
    setSyncStatus("saving");
    try {
      await jbWrite(cr.apiKey, cr.binId, payload);
      setSyncStatus("synced");
    } catch { setSyncStatus("error"); }
  }, []);

  const debouncedSync = useCallback((payload, cr) => {
    clearTimeout(syncDebounce.current);
    setSyncStatus("saving");
    syncDebounce.current = setTimeout(() => pushToCloud(payload, cr), 600);
  }, [pushToCloud]);

  // Load from cloud on mount if creds present
  useEffect(() => {
    const cr = loadCreds();
    if (!cr.apiKey || !cr.binId) return;
    (async () => {
      setSyncStatus("saving");
      try {
        const rec = await jbRead(cr.apiKey, cr.binId);
        if (!rec || rec._init) { setSyncStatus("synced"); return; }
        if (rec.userCards) {
          setCards(applyData(rec.userCards));
          saveLS(SKEY, rec.userCards);
        }
        if (rec.customCards) { setCustomCards(rec.customCards); saveLS(CUSTOM_KEY, rec.customCards); }
        if (rec.removed)     { setRemoved(new Set(rec.removed)); saveLS(RMKEY, rec.removed); }
        if (rec.sfPrices)    { setSfPrices(rec.sfPrices);   saveLS(SFKEY, rec.sfPrices); }
        if (rec.manaCosts)   { setManaCosts(rec.manaCosts); saveLS(MCKEY, rec.manaCosts); }

          React.createElement("div",{className:"footer-right"},
            React.createElement("span",{className:"footer-total-lbl"},filter!=="all"?`${filter} view:`:"total:"),
            React.createElement("span",{className:"footer-total-val"},fmt(filter==="all"?mAll:mVis)),
          ),
        ),
      ),
    ),

    React.createElement("div",{className:"meta"},
      `showing ${list.length} of ${total} cards \u2014 saved to localStorage`+(hasSF?" \u2014 scryfall data cached":"")
    ),

    // Graveyard
    showRemoved&&removedCards.length>0&&React.createElement("div",{className:"graveyard-section"},
      React.createElement("div",{className:"graveyard-header"},
        React.createElement("span",null,"\u26b0"),
        React.createElement("span",{className:"graveyard-title"},"The Graveyard"),
        React.createElement("span",{className:"graveyard-sub"},`${removedCards.length} card${removedCards.length!==1?"s":""} \u2014 return to hand to restore`),
      ),
      ...removedCards.map(card=>{
        const cl=cardColors[card.id]||{};
        const cfg=CAT[getCategory(cl.colors,cl.typeLine)]||{};
        return React.createElement("div",{key:card.id,className:"graveyard-row"},
          React.createElement("div",{className:"color-dot",style:{background:cfg.dot||"#4a3a3a",borderColor:cfg.border||"#4a3a3a",opacity:0.5}}),
          React.createElement("span",{className:"graveyard-name"},card.name),
          React.createElement("span",{className:"graveyard-set"},`${card.set} ${card.num}`),
          React.createElement("button",{className:"graveyard-restore",onClick:()=>restoreCard(card.id)},"return to hand"),
        );
      }),
    ),
  );
}

// ── CardRow ───────────────────────────────────────────────────────────────────
function CardRow({ card, isLast, notesOpen, searchTerm, sfPrice, manaCost, catInfo, onAcquire, onPriority, onNotes, onPrice, onToggleNotes, onRemove }) {
  const [editing, setEditing] = useState(false);
  const [draft,   setDraft]   = useState("");
  const [armed,   setArmed]   = useState(false);
  const inputRef = useRef(null);
  const armTimer = useRef(null);

  const startEdit  = () => { setDraft(card.price); setEditing(true); setTimeout(()=>inputRef.current&&inputRef.current.select(),10); };
  const commitEdit = () => { const raw=draft.replace(/[$,\s]/g,""); const n=parseFloat(raw); onPrice(isNaN(n)?"":n.toFixed(2)); setEditing(false); };
  const handleKey  = e => { if(e.key==="Enter")commitEdit(); if(e.key==="Escape")setEditing(false); };

  const handleGraveyard = () => {
    if (!armed) {
      setArmed(true);
      armTimer.current = setTimeout(() => setArmed(false), 2500);
    } else {
      clearTimeout(armTimer.current);
      onRemove();
    }
  };

  const priceDisplay = card.price!==""?fmt(parseFloat(card.price)):"";
  const lineTotal    = card.qty>1&&card.price!==""?fmt(parseFloat(card.price)*card.qty):null;
  const notesMatch   = searchTerm&&card.notes.toLowerCase().includes(searchTerm);
  const notePreview  = card.notes.slice(0,36)+(card.notes.length>36?"...":"");

  const sfUndef  = sfPrice===undefined;
  const sfNA     = sfPrice==="N/A"||sfPrice===null;
  const sfNum    = (!sfUndef&&!sfNA)?parseFloat(sfPrice):null;
  const sfDisplay= sfUndef?null:sfNA?"N/A":fmt(sfNum);
  const sfLineTot= sfNum!==null&&card.qty>1?fmt(sfNum*card.qty):null;

  const dotStyle = catInfo
    ? { background:catInfo.dot, borderColor:catInfo.border }
    : { background:"var(--border2)", borderColor:"var(--border2)" };

  return React.createElement("div",{className:"row"},
    React.createElement("div",{className:`row-main${card.acquired?" acquired":""}`},
      // checkbox
      React.createElement("input",{type:"checkbox",checked:card.acquired,onChange:onAcquire,style:{width:13,height:13,cursor:"pointer",accentColor:"var(--green)"}}),
      // color dot
      React.createElement("div",{className:"color-dot",style:dotStyle,title:catInfo?.label||"unknown"}),
      // name cell
      React.createElement("div",{className:"card-name-cell"},
        React.createElement("div",{className:"card-name-line"},
          card.qty>1&&React.createElement("span",{className:"qty-badge"},`x${card.qty}`),
          React.createElement("span",{className:`card-name-text${card.acquired?" struck":""}`,style:{fontWeight:card.priority===1?500:400}},card.name),
          card.custom&&React.createElement("span",{className:"custom-badge",title:"custom card"},"custom"),
          manaCost&&React.createElement(ManaCost,{cost:manaCost}),
          card.notes&&!notesOpen&&React.createElement("span",{className:`note-preview${notesMatch?" match":""}`},`\u2014 ${notePreview}`),
        ),
      ),
      // scryfall price
      React.createElement("div",{className:"sf-cell"},
        sfDisplay===null
          ? React.createElement("span",{className:"sf-val empty"},"\u2014")
          : React.createElement("div",{style:{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:1}},
              React.createElement("span",{className:`sf-val${sfNA?" na":""}`},sfDisplay),
              sfLineTot&&React.createElement("span",{className:"sf-sub"},`${sfLineTot} total`),
            )
      ),
      // manual price
      React.createElement("div",{className:"price-cell"},
        editing
          ? React.createElement("input",{ref:inputRef,type:"text",value:draft,onChange:e=>setDraft(e.target.value),onBlur:commitEdit,onKeyDown:handleKey,className:"price-input"})
          : React.createElement("div",{onClick:startEdit,title:"click to enter price",className:"price-display"},
              React.createElement("span",{className:`price-val${card.price===""?" empty":""}`},card.price!==""?priceDisplay:"$\u2014\u2014"),
              lineTotal&&React.createElement("span",{className:"price-sub"},`${lineTotal} total`),
            )
      ),
      // set + note btn
      React.createElement("div",{className:"set-meta"},
        React.createElement("button",{className:`note-btn${card.notes?" has-note":""}${notesOpen?" open-state":""}`,onClick:onToggleNotes},
          notesOpen?"close":card.notes?"note":"+ note"
        ),
        React.createElement("span",{className:"set-code"},`${card.set} ${card.num}`),
      ),
      // priority buttons + graveyard button
      React.createElement("div",{className:"priority-btns"},
        ...[1,2,3,4,5].map(p=>{
          const active=card.priority===p;
          return React.createElement("button",{key:p,className:"pbtn",onClick:()=>onPriority(p),title:P_NAMES[p],
            style:{background:active?P_COLORS[p]:"transparent",color:active?"#fff":"var(--text3)",
              border:`0.5px solid ${active?"transparent":"var(--border2)"}`,transition:"background 0.1s,color 0.1s"}},`P${p}`);
        }),
        React.createElement("button",{
          className:`remove-btn${armed?" armed":""}`,
          onClick:handleGraveyard,
          title:armed?"click again to send to graveyard":"send to graveyard",
        }, armed?"\u26b0?":"\u26b0"),
      ),
    ),
    notesOpen&&React.createElement("div",{className:"notes-area"},
      React.createElement("textarea",{value:card.notes,onChange:e=>onNotes(e.target.value),placeholder:"price, condition, source, etc.",rows:2})
    ),
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
